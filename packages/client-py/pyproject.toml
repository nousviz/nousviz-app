[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nousviz-client"
version = "1.0.0"
description = "Auto-generated Python client for the NousViz API."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "NousViz", email = "hello@nousviz.online"}]
keywords = ["nousviz", "api", "client", "openapi"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.23.0,<0.29.0",
    "attrs>=22.2.0",
    "python-dateutil>=2.8.0,<3",
]

[project.urls]
Homepage = "https://github.com/nousviz/nousviz-app"
Documentation = "https://nousviz.online/docs/api"
Source = "https://github.com/nousviz/nousviz-app/tree/main/packages/client-py"

[tool.setuptools.packages.find]
include = ["nousviz_client*"]

[tool.setuptools.package-data]
nousviz_client = ["py.typed"]
