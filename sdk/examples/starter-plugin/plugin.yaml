# ── Built-in field types (v0.8.6 / P120) ─────────────────────────────────────
# In connections.fields, in addition to text/number/password/toggle/select
# you can now use:
#
#   type: file    — drag-drop file upload with paste-text fallback
#                   optional: accept: ".pem,.crt"   format_hint: pem
#   type: port    — number input 1..65535 with "privileged port" badge
#   type: cron    — cron expression with preview + presets
#   type: url     — URL input with optional scheme constraint
#                   optional: scheme: "https"


# ── Secret field flag (v0.8.6.2 / B124) ──────────────────────────────────────
# Any field can be marked `secret: true` to route the saved value to the
# encrypted credentials table instead of .env. Orthogonal to `type:` —
# works on `type: file` (PEM certs), `type: text` (tokens pasted in),
# anything. `type: password` is implicitly secret for backward compat.
#
# Example: a PEM cert uploaded via drag-drop, stored encrypted, never on disk:
#
#   - name: ssl_ca
#     type: file
#     format_hint: pem
#     secret: true          # ← without this, PEM lands in .env (bad)
