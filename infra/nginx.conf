# Nousviz — self-hosted nginx config (HTTP)
#
# Serves the React dashboard from apps/web/dist and proxies /api/ to FastAPI.
# For HTTPS, run: ./scripts/ssl-setup.sh
#
# Install:
#   sudo cp infra/nginx.conf /etc/nginx/sites-available/nousviz
#   sudo ln -sf /etc/nginx/sites-available/nousviz /etc/nginx/sites-enabled/nousviz
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx


server {
    listen 80;
    server_name _;   # Replace with your domain: server_name app.example.com;

    # ── API (FastAPI on port 8000) ─────────────────────────────────────
    # Every API response must bypass every intermediary cache — Safari's
    # disk cache, service workers, CDN edges, internal caches. The API is
    # 100% dynamic; there is nothing cacheable here and stale reads
    # produce user-visible bugs (e.g. /api/jobs returning a pre-deploy
    # shape hours after the deploy).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Belt-and-braces no-cache on every API response. The FastAPI
        # middleware already sets this, but we set it again at the edge
        # so no intermediary (Safari, CDN, service worker) gets a chance
        # to decide otherwise.
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── OpenAPI schema (FastAPI) ───────────────────────────────────────
    location = /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }
    location = /openapi.yaml {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── React dashboard (static build in apps/web/dist) ───────────────
    # Change this path if NousViz is installed somewhere other than /opt/nousviz
    root /opt/nousviz/apps/web/dist;
    index index.html;

    # index.html — never cache so browsers always get the latest JS/CSS references
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;   # Required for React SPA routing
    }

    # Hashed asset filenames — safe to cache forever (filename changes on every build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # User uploads (avatars, etc.)
    location /uploads/ {
        alias /opt/nousviz/uploads/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    client_max_body_size 50M;

    # Block common attack paths
    location ~* /(\.env|\.git|wp-admin|xmlrpc\.php) {
        return 444;
    }
}
