# Nousviz — nginx config with SSL
#
# Generated by: ./scripts/ssl-setup.sh
# Placeholders replaced at install time:
#   __SSL_CERT__    → path to fullchain.pem
#   __SSL_KEY__     → path to privkey.pem
#   __SERVER_NAME__ → domain or _ for bare IP

# ── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    server_name __SERVER_NAME__;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name __SERVER_NAME__;

    ssl_certificate     __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS — tell browsers to always use HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API (FastAPI on port 8000) ─────────────────────────────────────
    # Every API response must bypass every intermediary cache. The API is
    # 100% dynamic; there is nothing cacheable here and stale reads produce
    # user-visible bugs. Belt-and-braces — FastAPI middleware also sets
    # these headers, but we set them again at the edge.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── OpenAPI schema (FastAPI) ───────────────────────────────────────
    location = /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }
    location = /openapi.yaml {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── React dashboard (static build in apps/web/dist) ───────────────
    root /opt/nousviz/apps/web/dist;
    index index.html;

    # index.html — never cache so browsers always get the latest JS/CSS references
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset filenames — safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # User uploads (avatars, etc.)
    location /uploads/ {
        alias /opt/nousviz/uploads/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    client_max_body_size 50M;

    # Block common attack paths
    location ~* /(\.env|\.git|wp-admin|xmlrpc\.php) {
        return 444;
    }
}
